<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliPrep - Admin Login</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #f59e0b; /* Amber/Gold for admin */
            --primary-light: #fbbf24;
            --primary-dark: #d97706;
            --secondary: #ec4899;
            --bg-body: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        h1,
        h2,
        h3,
        .logo-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* ================= BACKGROUND ANIMATION ================= */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            top: -100px;
            left: -200px;
            z-index: -1;
            animation: floatGlow 10s ease-in-out infinite alternate;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
            z-index: -1;
            animation: floatGlow 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatGlow {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 50px) scale(1.1);
            }
        }

        .container {
            max-width: 500px; /* smaller for admin, central focus */
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 32px;
            padding: 10px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 0 0 40px rgba(245, 158, 11, 0.1);
            z-index: 1;
        }

        /* ================= LOGIN SECTION ================= */
        .login-section {
            padding: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-badge {
            display: inline-block;
            background: rgba(245, 158, 11, 0.2);
            color: var(--primary-light);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 24px;
            border: 1px solid rgba(245, 158, 11, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-header {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-icon {
            position: absolute;
            bottom: 15px;
            left: 16px;
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .input-field {
            width: 100%;
            padding: 14px 46px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .input-field:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
        }

        .input-field:focus+.input-icon {
            color: var(--primary);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            bottom: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #fff;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary) 0%, #b45309 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
        }

        .signup-section {
            margin-top: 24px;
            font-size: 15px;
            text-align: center;
            color: var(--text-muted);
        }

        .signup-link {
            color: var(--primary-light);
            font-weight: 600;
            text-decoration: none;
            margin-left: 4px;
            transition: color 0.3s ease;
        }

        .signup-link:hover {
            color: #fff;
            text-decoration: underline;
        }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="container">

        <!-- LOGIN CARD -->
        <div class="login-section">
            <div style="display: flex; justify-content: space-between; align-items: start;">
                <a href="{{ url_for('landing') }}" class="logo">
                    <img src="{{ url_for('static', filename='images/Logo.jpeg') }}" alt="IntelliPrep Logo"
                        class="logo-icon">
                    <span class="logo-text">IntelliPrep</span>
                </a>
            </div>
            
            <div class="admin-badge"><i class="fas fa-shield-alt"></i> Admin Portal</div>

            <h1 class="login-header">Admin System <i class="fas fa-lock" style="font-size: 24px; color: var(--primary);"></i></h1>
            <p class="login-subtitle">Authenticate to access the administrative dashboard.</p>

            {% if error %}
            <div class="error-msg">
                <i class="fas fa-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('admin_login') }}">

                <div class="input-group">
                    <label class="form-label">Admin Email</label>
                    <input type="email" name="email" class="input-field" placeholder="admin@intelliprep.com" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>

                <div class="input-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="input-field"
                        placeholder="Enter your admin password" required>
                    <i class="fas fa-key input-icon"></i>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eye-icon"></i>
                    </button>
                </div>

                <button type="submit" class="btn-login">
                    Authorize
                </button>
            </form>

            <div class="signup-section">
                Not an administrator?
                <a href="{{ url_for('login') }}" class="signup-link">Standard Login</a>
            </div>
        </div>

    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>

</body>

</html>
