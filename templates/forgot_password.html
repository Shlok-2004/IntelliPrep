<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliPrep - Password Recovery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366F1;
            --primary-light: #818CF8;
            --bg-body: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        h1, .logo-text { font-family: 'Plus Jakarta Sans', sans-serif; }

        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; top: -100px; left: -200px; z-index: -1;
            animation: floatGlow 10s ease-in-out infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            z-index: 1;
        }

        .logo { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 30px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; box-shadow: 0 0 10px rgba(99,102,241,0.5); object-fit: cover;}
        .logo-text { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        p { color: var(--text-muted); font-size: 15px; margin-bottom: 32px; }

        .input-group { margin-bottom: 20px; position: relative; }
        .form-label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; display: block; text-transform: uppercase; }
        .input-icon { position: absolute; bottom: 15px; left: 16px; color: var(--text-muted); font-size: 16px; transition: color 0.3s; }
        
        .input-field {
            width: 100%; padding: 14px 16px 14px 46px; border-radius: 12px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; font-size: 15px; outline: none; transition: all 0.3s;
        }
        .input-field:focus { border-color: var(--primary); background: rgba(15, 23, 42, 0.8); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }
        .input-field:focus + .input-icon { color: var(--primary); }

        .btn-reset {
            width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600;
            background: linear-gradient(135deg, var(--primary) 0%, #8B5CF6 100%); color: white; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); text-transform: uppercase;
            letter-spacing: 1px; font-family: 'Plus Jakarta Sans', sans-serif; margin-top: 10px;
        }
        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5); }

        .back-login { text-align: center; margin-top: 24px; font-size: 15px; }
        .back-login a { color: var(--primary-light); font-weight: 600; text-decoration: none; transition: color 0.3s; }
        .back-login a:hover { color: #fff; text-decoration: underline; }

        .alert { padding: 12px; border-radius: 8px; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #fca5a5; margin-bottom: 20px; font-size: 14px; text-align: center; }
        .alert-success { background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.5); color: #86efac; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <a href="{{ url_for('landing') }}" class="logo">
        <img src="{{ url_for('static', filename='images/Logo.jpeg') }}" alt="IntelliPrep Logo" class="logo-icon">
        <span class="logo-text">IntelliPrep</span>
    </a>

    <h1>Reset Password 🔐</h1>
    <p>Enter your email and a new password to reset.</p>

    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="input-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="input-field" placeholder="john@example.com" required>
            <i class="fas fa-envelope input-icon"></i>
        </div>
        <div class="input-group">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="input-field" placeholder="Must be at least 6 characters" minlength="6" required>
            <i class="fas fa-lock input-icon"></i>
        </div>
        <button type="submit" class="btn-reset">Update Password</button>
    </form>

    <div class="back-login">
        <a href="{{ url_for('login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
</div>

</body>
</html>
